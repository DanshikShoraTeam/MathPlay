<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar — MathPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --violet: #6d28d9;
  --violet-dark: #4c1d95;
  --violet-mid: #8b5cf6;
  --violet-light: #ede9fe;
  --violet-pale: #f5f3ff;
  --ink: #0f0a1e;
  --gray: #6b7280;
  --border: #e9e4f8;
  --white: #ffffff;
  --sidebar-w: 260px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: #f7f6fb;
  display: flex;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 28px 16px;
  position: fixed;
  top: 0; left: 0; bottom: 0;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 8px;
  margin-bottom: 36px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--violet);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.logo-text {
  font-family: 'Sora', sans-serif;
  font-weight: 800; font-size: 18px;
  color: var(--ink);
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.18s ease;
  text-decoration: none;
  color: var(--gray);
  font-size: 14px; font-weight: 500;
}
.nav-item:hover {
  background: var(--violet-pale);
  color: var(--violet);
}
.nav-item.active {
  background: var(--violet-light);
  color: var(--violet);
  font-weight: 600;
}
.nav-icon { font-size: 20px; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-badge {
  background: var(--violet);
  color: white;
  font-size: 11px; font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 12px 8px;
}

.sidebar-user {
  padding: 14px;
  border-radius: 14px;
  background: var(--violet-pale);
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  transition: background 0.18s;
}
.sidebar-user:hover { background: var(--violet-light); }

.user-avatar {
  width: 36px; height: 36px;
  background: var(--violet);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Sora', sans-serif;
  font-weight: 700; font-size: 15px;
  color: white; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name {
  font-size: 13px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-role { font-size: 11px; color: var(--gray); margin-top: 1px; }
.user-arrow { color: var(--gray); font-size: 16px; }

/* ── DEMO MAIN ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1; padding: 40px;
}
.demo-title {
  font-family: 'Sora', sans-serif;
  font-size: 24px; font-weight: 800; color: var(--ink);
}
.demo-sub { font-size: 14px; color: var(--gray); margin-top: 6px; }
</style>
</head>
<body>

<aside class="sidebar">

  <div class="sidebar-logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">MathPlay</span>
  </div>

  <nav class="sidebar-nav">

    <a href="/dashboard/" class="nav-item active">
      <i class="ph-bold ph-house nav-icon"></i>
      <span class="nav-label">Басты бет</span>
    </a>

    <a href="/dashboard/games/" class="nav-item">
      <i class="ph-bold ph-game-controller nav-icon"></i>
      <span class="nav-label">Менің ойындарым</span>
      <span class="nav-badge">5</span>
    </a>

    <a href="/dashboard/results/" class="nav-item">
      <i class="ph-bold ph-chart-bar nav-icon"></i>
      <span class="nav-label">Нәтижелер</span>
    </a>

  </nav>

  <div class="sidebar-divider"></div>

  <div class="sidebar-user">
    <div class="user-avatar">А</div>
    <div class="user-info">
      <div class="user-name">Айгерім мұғалім</div>
      <div class="user-role">Мұғалім</div>
    </div>
    <i class="ph-bold ph-sign-out user-arrow"></i>
  </div>

</aside>

<main class="main">
  <div class="demo-title">Басты бет</div>
  <div class="demo-sub">Sidebar компоненті — MathPlay</div>
</main>

<script>
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });
</script>

</body>
</html>
