<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froggy Jump Math | Premium Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #123b2f;
            --water-color: #1a4a3e;
            --lily-pad: #2ecc71;
            --lily-pad-dark: #27ae60;
            --text-color: #ffffff;
            --accent-color: #f1c40f;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Game World --- */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 600px;
            background: linear-gradient(to bottom, #123b2f 0%, #0d2b22 100%);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
        }

        .bank {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 150px;
            height: 200px;
            background: #2d5a27;
            border-top-right-radius: 100px;
            z-index: 5;
            box-shadow: 10px 0 20px rgba(0,0,0,0.2);
        }

        .water {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 250px;
            background: var(--water-color);
            z-index: 1;
        }

        /* --- Waves --- */
        .waves {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
        }

        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }

        @keyframes move-forever {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        /* --- UI Elements --- */
        .ui-panel {
            position: absolute;
            padding: 15px 25px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            z-index: 10;
        }

        #score-panel { top: 20px; right: 20px; text-align: right; }
        #life-panel { top: 20px; left: 20px; display: flex; gap: 8px; }
        #question-panel {
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 800;
            min-width: 200px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .heart { font-size: 1.5rem; filter: drop-shadow(0 0 5px rgba(255,0,0,0.5)); transition: transform 0.3s; }
        .heart.lost { opacity: 0.2; transform: scale(0.8); }

        /* --- Lily Pads --- */
        #pond {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .lily-pad {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, var(--lily-pad), var(--lily-pad-dark));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 0 #1b6337, 0 15px 25px rgba(0,0,0,0.3);
            animation: float 4s ease-in-out infinite;
        }

        .lily-pad:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 0 #1b6337, 0 20px 35px rgba(0,0,0,0.4);
        }

        .lily-pad::after {
            content: '';
            position: absolute;
            top: 10%;
            right: 10%;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* --- Frog --- */
        #frog {
            position: absolute;
            font-size: 60px;
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            left: 45px;
            bottom: 160px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .frog-jumping {
            transition: all 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95) !important;
        }

        /* --- Screens --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(18, 59, 47, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.5s;
        }

        .hidden { display: none !important; opacity: 0; }

        h1 { font-size: 3.5rem; margin-bottom: 10px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        p { font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px; }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--lily-pad);
            color: var(--bg-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: var(--text-color);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .stat-val { font-size: 2.5rem; font-weight: 800; color: var(--accent-color); }
        .stat-label { font-size: 0.9rem; text-transform: uppercase; opacity: 0.6; }

        /* Splash Effect */
        .splash {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px solid #fff;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 4;
        }

        @keyframes splash-anim {
            0% { transform: scale(0.5); opacity: 0.8; border-width: 8px; }
            100% { transform: scale(2.5); opacity: 0; border-width: 1px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- UI -->
    <div id="life-panel" class="ui-panel">
        <span class="heart">❤️</span>
        <span class="heart">❤️</span>
        <span class="heart">❤️</span>
    </div>
    <div id="score-panel" class="ui-panel">
        <div style="font-size: 0.8rem; opacity: 0.7;">SCORE</div>
        <div id="score-val" style="font-size: 1.5rem; font-weight: 800;">0</div>
    </div>
    <div id="question-panel" class="ui-panel">2 + 3 = ?</div>

    <!-- World -->
    <div class="bank"></div>
    <div id="pond"></div>
    <div id="frog">🐸</div>

    <div class="water">
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
             viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(26, 74, 62, 0.7" />
                <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(26, 74, 62, 0.5)" />
                <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(26, 74, 62, 0.3)" />
                <use xlink:href="#gentle-wave" x="48" y="7" fill="#1a4a3e" />
            </g>
        </svg>
    </div>

    <!-- Screens -->
    <div id="start-screen" class="overlay">
        <h1>Froggy Jump</h1>
        <p>Master math to help Froggy cross the pond!</p>
        <button class="btn" onclick="game.start()">Start Adventure</button>
    </div>

    <div id="result-screen" class="overlay hidden">
        <h1 id="result-title">Victory!</h1>
        <div class="stat-grid">
            <div class="stat-card">
                <div id="final-score" class="stat-val">0</div>
                <div class="stat-label">Final Score</div>
            </div>
            <div class="stat-card">
                <div id="xp-earned" class="stat-val">+0</div>
                <div class="stat-label">XP Gained</div>
            </div>
        </div>
        <button class="btn" onclick="game.start()">Play Again</button>
    </div>
</div>

<script>
    /**
     * SOUND ENGINE
     * Synthesizes audio using Web Audio API
     */
    class SoundEngine {
        constructor() {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }

        init() {
            if (this.ctx.state === 'suspended') this.ctx.resume();
        }

        playJump() {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.3);
        }

        playSplash() {
            const bufferSize = this.ctx.sampleRate * 0.5;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, this.ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.4);
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            noise.start();
        }

        playWin() {
            this.playChord([261.63, 329.63, 392.00, 523.25]);
        }

        playFail() {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.frequency.setValueAtTime(200, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.5);
        }

        playChord(freqs) {
            freqs.forEach((f, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(f, this.ctx.currentTime + i * 0.05);
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + i * 0.05 + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.8);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 1);
            });
        }
    }

    /**
     * GAME ENGINE
     */
    const game = {
        score: 0,
        lives: 3,
        questionCount: 0,
        currentAnswer: 0,
        isJumping: false,
        sounds: new SoundEngine(),
        
        start() {
            this.sounds.init();
            this.score = 0;
            this.lives = 3;
            this.questionCount = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            this.updateUI();
            this.resetFrog();
            this.nextQuestion();
        },

        resetFrog() {
            const frog = document.getElementById('frog');
            frog.style.left = '45px';
            frog.style.bottom = '160px';
            frog.style.transform = 'scale(1)';
            frog.classList.remove('frog-jumping');
        },

        updateUI() {
            document.getElementById('score-val').innerText = this.score;
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach((h, i) => {
                if (i < this.lives) h.classList.remove('lost');
                else h.classList.add('lost');
            });
        },

        nextQuestion() {
            if (this.questionCount >= 5) {
                this.endGame(true);
                return;
            }
            this.questionCount++;
            
            // Generate Question
            const types = ['+', '-', '*'];
            const type = types[Math.floor(Math.random() * types.length)];
            let a, b, q;
            
            if (type === '+') {
                a = Math.floor(Math.random() * 20) + 1;
                b = Math.floor(Math.random() * 20) + 1;
                this.currentAnswer = a + b;
                q = `${a} + ${b} = ?`;
            } else if (type === '-') {
                a = Math.floor(Math.random() * 20) + 10;
                b = Math.floor(Math.random() * a);
                this.currentAnswer = a - b;
                q = `${a} - ${b} = ?`;
            } else {
                a = Math.floor(Math.random() * 10) + 2;
                b = Math.floor(Math.random() * 10) + 2;
                this.currentAnswer = a * b;
                q = `${a} × ${b} = ?`;
            }

            document.getElementById('question-panel').innerText = q;
            this.generateLilyPads();
        },

        generateLilyPads() {
            const pond = document.getElementById('pond');
            pond.innerHTML = '';
            
            const answers = [this.currentAnswer];
            while (answers.length < 5) {
                const wrong = this.currentAnswer + (Math.floor(Math.random() * 10) - 5);
                if (wrong !== this.currentAnswer && wrong >= 0 && !answers.includes(wrong)) {
                    answers.push(wrong);
                }
            }
            
            // Shuffle
            answers.sort(() => Math.random() - 0.5);

            answers.forEach((val, i) => {
                const pad = document.createElement('div');
                pad.className = 'lily-pad';
                pad.innerText = val;
                
                // Position pads in a semi-random arc/line
                const x = 250 + (i * 150);
                const y = 100 + (Math.sin(i) * 50);
                
                pad.style.left = `${x}px`;
                pad.style.bottom = `${y}px`;
                pad.style.animationDelay = `${i * 0.2}s`;
                
                pad.onclick = () => this.handlePadClick(val, x, y);
                pond.appendChild(pad);
            });
        },

        handlePadClick(val, x, y) {
            if (this.isJumping) return;
            
            if (val === this.currentAnswer) {
                this.jumpTo(x, y, true);
            } else {
                this.jumpTo(x, y, false);
            }
        },

        jumpTo(x, y, correct) {
            this.isJumping = true;
            const frog = document.getElementById('frog');
            this.sounds.playJump();

            // Parabolic jump logic
            const startX = frog.offsetLeft;
            const startY = parseInt(frog.style.bottom);
            const targetX = x + 20; // Center on pad
            const targetY = y + 30;

            frog.style.left = `${targetX}px`;
            frog.style.bottom = `${targetY}px`;
            frog.style.transform = `scale(1.2) rotate(10deg)`;
            
            setTimeout(() => {
                if (correct) {
                    this.score += 100;
                    this.updateUI();
                    frog.style.transform = `scale(1) rotate(0deg)`;
                    setTimeout(() => {
                        this.nextQuestion();
                        this.isJumping = false;
                        // Jump back to bank for next round effect
                        setTimeout(() => this.resetFrog(), 500);
                    }, 500);
                } else {
                    this.lives--;
                    this.updateUI();
                    this.sounds.playSplash();
                    this.createSplash(targetX + 30, 600 - targetY);
                    
                    frog.style.transform = `scale(0.5) translateY(50px)`;
                    frog.style.opacity = '0';
                    
                    setTimeout(() => {
                        if (this.lives <= 0) {
                            this.endGame(false);
                        } else {
                            this.resetFrog();
                            frog.style.opacity = '1';
                            this.isJumping = false;
                        }
                    }, 800);
                }
            }, 600);
        },

        createSplash(x, y) {
            const splash = document.createElement('div');
            splash.className = 'splash';
            splash.style.left = `${x - 50}px`;
            splash.style.top = `${y}px`;
            splash.style.animation = 'splash-anim 0.6s ease-out forwards';
            document.getElementById('game-container').appendChild(splash);
            setTimeout(() => splash.remove(), 600);
        },

        endGame(win) {
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const finalScore = document.getElementById('final-score');
            const xpEarned = document.getElementById('xp-earned');

            if (win) {
                title.innerText = "Pond Crossed!";
                this.sounds.playWin();
            } else {
                title.innerText = "Game Over";
                this.sounds.playFail();
            }

            finalScore.innerText = this.score;
            xpEarned.innerText = `+${Math.floor(this.score / 2)}`;
            
            screen.classList.remove('hidden');
        }
    };

    // Prevent scrolling on mobile
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
</script>

</body>
</html>
