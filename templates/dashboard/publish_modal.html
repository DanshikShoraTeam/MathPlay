<div id="publishModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 9, 45, 0.4); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
    <div class="card" style="background: white; border-radius: 16px; max-width: 480px; width: 90%; padding: 2.5rem; text-align: center; box-shadow: 0 1rem 3rem rgba(0,0,0,0.15); border: 1px solid var(--qz-purple-border);">
        <div style="display: flex; justify-content: flex-end; margin: -1.5rem -1rem 0 0;">
            <button onclick="hideModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--qz-text-light);">
                <i class="ph-bold ph-x"></i>
            </button>
        </div>
        
        <div style="font-size: 3rem; color: var(--qz-purple); margin-bottom: 1rem;">
            <i class="ph-duotone ph-megaphone"></i>
        </div>
        <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">Ойын жарияланды!</h2>
        <p style="color: var(--qz-text-light); font-size: 0.9375rem; margin-bottom: 2rem;">Сілтемені оқушыларыңызға жіберіңіз</p>
        
        <div id="qrcode" style="display: flex; justify-content: center; margin-bottom: 2rem; padding: 1rem; background: white; border-radius: 12px; border: 1px solid #f1f5f9;"></div>
        
        <div style="background: var(--qz-purple-soft); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <p style="font-size: 0.75rem; font-weight: 700; color: var(--qz-text-light); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em;">Ойын коды (GamePin)</p>
            <p id="modalPin" style="font-weight: 800; font-size: 2.5rem; color: var(--qz-purple); letter-spacing: 0.2em; margin-bottom: 1.5rem;">ABC123</p>
            
            <div style="display: flex; gap: 0.5rem; background: white; padding: 8px; border-radius: 8px; border: 1px solid var(--qz-purple-border);">
                <input type="text" id="modalLink" readonly style="flex: 1; border: none; background: transparent; padding-left: 8px; font-size: 0.8125rem; color: var(--qz-text-light); outline: none;">
                <button onclick="copyModalLink()" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.75rem;">
                    <i class="ph-duotone ph-copy"></i> Көшіру
                </button>
            </div>
        </div>
        
        <button onclick="hideModal()" class="btn btn-outline" style="width: 100%; padding: 0.875rem;">Жабу</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    function showModal(pin, link) {
        document.getElementById('publishModal').style.display = 'flex';
        document.getElementById('modalPin').innerText = pin;
        document.getElementById('modalLink').value = link;
        
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById("qrcode"), {
            text: link,
            width: 160,
            height: 160,
            colorDark : "#303545",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    function hideModal() {
        document.getElementById('publishModal').style.display = 'none';
    }

    function copyModalLink() {
        const copyText = document.getElementById("modalLink");
        copyText.select();
        document.execCommand("copy");
        const btn = event.currentTarget;
        const oldContent = btn.innerHTML;
        btn.innerHTML = '<i class="ph-duotone ph-check-circle"></i> Көшірілді';
        setTimeout(() => btn.innerHTML = oldContent, 2000);
    }
    
    function publishGame(pk) {
        const link = window.location.origin + "/play/MP" + pk + "/";
        showModal("MP" + pk, link);
    }
</script>
