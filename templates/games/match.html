{% extends 'base.html' %}
{% block title %}Match — {{ game.title }}
{% endblock %}

{% block extra_css %}
<style>

#game-root { width: 100%; display: flex; justify-content: center; }

.match-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 2rem; }

/* HUD */
.match-hud {
    width: 100%; max-width: 820px;
    display: flex; justify-content: space-between; align-items: center;
    background: white; border-radius: 16px; padding: 0.875rem 1.5rem;
    box-shadow: 0 4px 20px rgba(109,40,217,0.1); margin-bottom: 1.5rem;
    flex-wrap: wrap; gap: 0.5rem;
}
.hud-pill { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 800; color: #374151; background: #f5f3ff; padding: 4px 12px; border-radius: 20px; }
.hud-pill i { color: #7c3aed; }
.hud-pill span { color: #5b21b6; }

/* Board */
.match-board { position: relative; width: 100%; max-width: 820px; display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

/* SVG overlay */
#linesSvg { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: visible; }

/* Column headers */
.col-head { text-align: center; margin-bottom: 0.75rem; }
.col-badge { display: inline-block; padding: 5px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
.col-badge.q { background: #dbeafe; color: #1d4ed8; }
.col-badge.a { background: #ede9fe; color: #6d28d9; }

/* Items */
.match-item {
    padding: 0.875rem 1.25rem; border-radius: 14px; border: 2.5px solid #e8e0ff;
    background: white; font-size: 0.9375rem; font-weight: 700; color: #1e1b4b;
    cursor: pointer; transition: all 0.18s; margin-bottom: 0.625rem;
    text-align: center; user-select: none;
    box-shadow: 0 2px 8px rgba(109,40,217,0.06);
}
.match-item:hover:not(.matched) { border-color: #7c3aed; background: #f5f3ff; transform: translateY(-1px); }
.match-item.selected { border-color: #7c3aed; background: #ede9fe; color: #5b21b6; box-shadow: 0 0 0 3px rgba(124,58,237,0.18); }
.match-item.matched  { border-color: #10b981; background: #f0fdf4; color: #166534; pointer-events: none; }
.match-item.wrong    { animation: shake 0.4s; border-color: #ef4444; background: #fef2f2; color: #991b1b; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 75%{transform:translateX(9px)} }

/* SVG line */
.match-line { stroke: #10b981; stroke-width: 3; fill: none; stroke-linecap: round; opacity: 0.8; transition: stroke-dashoffset 0.6s ease; }
@keyframes drawLine { to { stroke-dashoffset: 0; } }

/* Music */
.music-btn { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 44px; height: 44px; background: white; border-radius: 50%; border: 2px solid #ddd6fe; box-shadow: 0 4px 16px rgba(109,40,217,0.15); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #7c3aed; font-size: 1.25rem; z-index: 200; transition: all 0.2s; }
.music-btn:hover { transform: scale(1.1); }

@media (max-width: 600px) {
    .match-item { font-size: 0.8125rem; padding: 0.75rem 0.875rem; }
}
</style>
{% endblock %}

{% block content %}
<div class="flex-center" style="background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%)">
<div id="game-root">
    <div class="match-wrap">
        <div class="match-hud">
            <div class="hud-pill"><i class="ph-duotone ph-link"></i> {{ game.title }}</div>
            <div class="hud-pill"><i class="ph-duotone ph-check-fat"></i> Сәйкес: <span id="matchedCount">0</span> / {{ game.questions|length }}</div>
            <div class="hud-pill"><i class="ph-duotone ph-clock"></i> <span id="timer">0:00</span></div>
        </div>

        <div class="match-board" id="board">
            <svg id="linesSvg"></svg>
            <div>
                <div class="col-head"><span class="col-badge q"><i class="ph-duotone ph-question"></i> Сұрақтар</span></div>
                <div id="leftCol"></div>
            </div>
            <div>
                <div class="col-head"><span class="col-badge a"><i class="ph-duotone ph-check"></i> Жауаптар</span></div>
                <div id="rightCol"></div>
            </div>
        </div>
    </div>
</div>

<button class="music-btn" id="musicBtn"><i class="ph-duotone ph-music-note" id="musicIcon"></i></button>
</div>
{% endblock %}

{% block extra_js %}
<script>
const questions = {{ game.questions|safe }};
const total = questions.length;
let matched = 0, selected = null, timerSec = 0, startTime = Date.now();

// ── Timer ──
const timerEl = document.getElementById('timer');
const timerInt = setInterval(() => {
    timerSec = Math.floor((Date.now()-startTime)/1000);
    timerEl.textContent = Math.floor(timerSec/60)+':'+ String(timerSec%60).padStart(2,'0');
}, 500);

// ── Audio ──
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAC(){ if(!audioCtx) audioCtx=new AC(); return audioCtx; }
function sfx(freq,dur,type='sine',vol=0.13){ try{ const c=getAC(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=type;o.frequency.value=freq; g.gain.setValueAtTime(vol,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur); o.start();o.stop(c.currentTime+dur); }catch(e){} }
const soundSelect  = () => sfx(600, 0.06, 'sine', 0.08);
const soundMatch   = () => { sfx(660,0.1); setTimeout(()=>sfx(880,0.12),90); };
const soundWrong   = () => sfx(220, 0.22, 'sawtooth', 0.1);
const soundComplete= () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>sfx(f,0.22),i*120));

// ── Puzzle BG music (steady chord pads) ──
let bgOn=true, bgInt=null, bgStep=0;
const PAD_NOTES=[[261,329,392],[220,277,349],[196,261,329],[233,293,369]];
function playPad(freq,vol=0.03){ try{ const c=getAC(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type='sine'; o.frequency.value=freq; g.gain.setValueAtTime(vol,c.currentTime); g.gain.linearRampToValueAtTime(vol,c.currentTime+0.1); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.9); o.start();o.stop(c.currentTime+1.0); }catch(e){} }
function startBg(){
    if(bgInt) return;
    bgInt=setInterval(()=>{
        if(!bgOn) return;
        const chord=PAD_NOTES[bgStep%PAD_NOTES.length];
        chord.forEach(f=>playPad(f,0.028));
        bgStep++;
    },1200);
}
document.getElementById('musicBtn').onclick=()=>{ getAC(); bgOn=!bgOn; document.getElementById('musicIcon').className=bgOn?'ph-duotone ph-music-note':'ph-duotone ph-music-note-slash'; startBg(); };

// ── Render ──
function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }
const left  = shuffle(questions.map((q,i)=>({text:q.q,id:i,side:'q'})));
const right = shuffle(questions.map((q,i)=>({text:q.a,id:i,side:'a'})));

function renderCol(items, colId) {
    const col = document.getElementById(colId);
    items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'match-item';
        el.textContent = item.text;
        el.dataset.id = item.id;
        el.dataset.side = item.side;
        el.onclick = () => { getAC(); startBg(); pick(el); };
        col.appendChild(el);
    });
}
renderCol(left,  'leftCol');
renderCol(right, 'rightCol');

let lines = []; // Store line data for redrawing
window.addEventListener('resize', () => {
    document.getElementById('linesSvg').innerHTML = '';
    lines.forEach(l => drawLine(l.a, l.b, false));
});

function pick(el) {
    if (el.classList.contains('matched')) return;

    if (!selected) {
        soundSelect();
        el.classList.add('selected'); selected = el; return;
    }
    if (selected === el) { el.classList.remove('selected'); selected = null; return; }

    // Same side — switch
    if (selected.dataset.side === el.dataset.side) {
        selected.classList.remove('selected');
        soundSelect();
        el.classList.add('selected'); selected = el; return;
    }

    // Evaluate
    if (selected.dataset.id === el.dataset.id) {
        soundMatch();
        const a = selected, b = el;
        [a, b].forEach(e => { e.classList.remove('selected'); e.classList.add('matched'); });
        drawLine(a, b);
        lines.push({a, b});
        matched++;
        document.getElementById('matchedCount').textContent = matched;
        selected = null;
        if (matched === total) { clearInterval(timerInt); setTimeout(endGame, 700); }
    } else {
        soundWrong();
        const prev = selected;
        [prev, el].forEach(e => { e.classList.remove('selected'); e.classList.add('wrong'); });
        setTimeout(() => { [prev, el].forEach(e => e.classList.remove('wrong')); selected = null; }, 700);
    }
}

function drawLine(elA, elB, animate = true) {
    const svg = document.getElementById('linesSvg');
    const board = document.getElementById('board');
    const boardRect = board.getBoundingClientRect();
    const rA = elA.getBoundingClientRect(), rB = elB.getBoundingClientRect();

    // Determine left and right items regardless of pick order
    const isALeft = elA.dataset.side === 'q';
    const leftRect = isALeft ? rA : rB;
    const rightRect = isALeft ? rB : rA;

    const x1 = leftRect.right - boardRect.left;
    const y1 = leftRect.top + leftRect.height / 2 - boardRect.top;
    const x2 = rightRect.left - boardRect.left;
    const y2 = rightRect.top + rightRect.height / 2 - boardRect.top;
    const mx = (x1 + x2) / 2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    path.setAttribute('d', d);
    path.classList.add('match-line');
    
    svg.appendChild(path);
    
    // Animate dash
    const length = path.getTotalLength();
    path.style.strokeDasharray = length;
    if (animate) {
        path.style.strokeDashoffset = length;
        path.getBoundingClientRect(); // trigger reflow
        path.style.strokeDashoffset = '0';
    } else {
        path.style.strokeDashoffset = '0';
    }
}

async function endGame() {
    soundComplete();
    if(bgInt){ clearInterval(bgInt); bgInt=null; }
    const data = { score_percent: 100, xp: 60, time_seconds: timerSec };
    try {
        const r = await fetch(location.href, { method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'}, body:JSON.stringify(data) });
        const j = await r.json();
        location.href='/play/{{ game.publish_code }}/result/'+j.session_id+'/';
    } catch(e){ console.error(e); }
}
</script>
{% endblock %}
