{% extends 'base.html' %}
{% block title %}Memory — {{ game.title }}
{% endblock %}

{% block extra_css %}
<style>

#game-root { width: 100%; display: flex; justify-content: center; }

.mem-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem 2rem; }

/* HUD */
.mem-hud {
    width: 100%; max-width: 820px;
    display: flex; justify-content: space-between; align-items: center;
    background: white; border-radius: 16px; padding: 0.875rem 1.5rem;
    box-shadow: 0 4px 20px rgba(109,40,217,0.1); margin-bottom: 1.5rem;
    flex-wrap: wrap; gap: 0.5rem;
}
.hud-pill {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.8rem; font-weight: 800; color: #374151;
    background: #f5f3ff; padding: 4px 12px; border-radius: 20px;
}
.hud-pill i { color: #7c3aed; font-size: 1rem; }
.hud-pill span { color: #5b21b6; }

/* Grid */
.mem-grid { display: grid; gap: 0.75rem; justify-content: center; }

/* Card */
.card-wrap { perspective: 700px; cursor: pointer; }
.card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 0.42s cubic-bezier(.4,0,.2,1);
}
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
    position: absolute; inset: 0; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden; font-family: 'Inter', sans-serif;
}
.card-front {
    background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
    box-shadow: 0 6px 18px rgba(109,40,217,0.35);
}
/* decorative pattern on front */
.card-front::before {
    content: ''; position: absolute; inset: 8px; border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.2);
}
.card-front::after {
    content: ''; width: 20px; height: 20px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.5);
}

.card-back {
    background: white; transform: rotateY(180deg);
    border: 2.5px solid #ddd6fe; font-size: 1rem; font-weight: 800;
    color: #1e1b4b; text-align: center; padding: 0.5rem;
    word-break: break-word;
    box-shadow: 0 2px 10px rgba(109,40,217,0.08);
}
.card-wrap.matched .card-back {
    border-color: #10b981; background: #f0fdf4; color: #166534;
    animation: matchPop 0.35s ease;
}
.card-wrap.matched { pointer-events: none; }
.card-wrap.wrong-flash .card-inner { animation: wrongFlash 0.15s ease 3; }
@keyframes matchPop { 0%,100%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.12)} }
@keyframes wrongFlash { 0%,100%{filter:brightness(1)} 50%{filter:brightness(0.6) sepia(1) hue-rotate(-30deg)} }

/* Music control */
.music-btn {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    width: 44px; height: 44px; background: white; border-radius: 50%;
    border: 2px solid #ddd6fe; box-shadow: 0 4px 16px rgba(109,40,217,0.15);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #7c3aed; font-size: 1.25rem; z-index: 200; transition: all 0.2s;
}
.music-btn:hover { transform: scale(1.1); }

/* Responsive card sizes */
@media (max-width: 600px) { :root { --card-sz: 80px; } }
@media (min-width: 601px) { :root { --card-sz: 110px; } }
.card-wrap { width: var(--card-sz, 110px); height: var(--card-sz, 110px); }
</style>
{% endblock %}

{% block content %}
<div class="flex-center" style="background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%)">
<div id="game-root">
    <div class="mem-wrap">
        <div class="mem-hud">
            <div class="hud-pill"><i class="ph-duotone ph-cards"></i> {{ game.title }}</div>
            <div class="hud-pill"><i class="ph-duotone ph-shuffle"></i> Жүрістер: <span id="moves">0</span></div>
            <div class="hud-pill"><i class="ph-duotone ph-clock"></i> <span id="timer">0:00</span></div>
            <div class="hud-pill"><i class="ph-duotone ph-check-fat"></i> <span id="pFound">0</span> / <span id="pTotal">0</span></div>
        </div>
        <div class="mem-grid" id="grid"></div>
    </div>
</div>

<button class="music-btn" id="musicBtn" title="Музыка">
    <i class="ph-duotone ph-music-note" id="musicIcon"></i>
</button>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
const questions = {{ game.questions|safe }};
const pairs = questions.length;
document.getElementById('pTotal').textContent = pairs;

// Build deck
let deck = [];
questions.forEach((q, i) => { deck.push({text: q.q, id: i}); deck.push({text: q.a, id: i}); });
deck.sort(() => Math.random() - 0.5);

// Grid columns: 4 for ≥8 cards, 3 for fewer
const cols = deck.length >= 8 ? 4 : 3;
const grid = document.getElementById('grid');
grid.style.gridTemplateColumns = `repeat(${cols}, var(--card-sz, 110px))`;

let flipped = [], moves = 0, pFound = 0, locked = false;
let timerSec = 0, startTime = Date.now();
const timerEl = document.getElementById('timer');
const timerInt = setInterval(() => {
    timerSec = Math.floor((Date.now() - startTime) / 1000);
    timerEl.textContent = Math.floor(timerSec/60)+':'+ String(timerSec%60).padStart(2,'0');
}, 500);

// ── Audio ──
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAC(){ if(!audioCtx) audioCtx=new AC(); return audioCtx; }
function sfx(freq,dur,type='sine',vol=0.12){ try{ const c=getAC(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=type;o.frequency.value=freq; g.gain.setValueAtTime(vol,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur); o.start();o.stop(c.currentTime+dur); }catch(e){} }
const soundFlip  = () => sfx(800, 0.06, 'sine', 0.08);
const soundMatch = () => { sfx(660,0.1); setTimeout(()=>sfx(880,0.12),100); };
const soundMiss  = () => sfx(200, 0.18, 'triangle', 0.08);
const soundWin   = () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>sfx(f,0.28),i*110));

// ── Ambient BG music (calm arpeggios) ──
let bgOn = true, bgInt = null, bgStep = 0;
// Am → C → F → G7 arpeggios
const CHORDS = [
    [220,261,329], [261,329,392], [174,220,261], [196,261,329]
];
function playBgNote(freq, vol=0.035) {
    try { const c=getAC(),o=c.createOscillator(),g=c.createGain(),rev=c.createGain(); o.connect(rev);rev.connect(g);g.connect(c.destination); rev.gain.value=0.3; o.type='sine'; o.frequency.value=freq; g.gain.setValueAtTime(vol,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.6); o.start();o.stop(c.currentTime+0.7); }catch(e){}
}
function startBg() {
    if (bgInt) return;
    let noteInChord = 0;
    bgInt = setInterval(() => {
        if (!bgOn) return;
        const chord = CHORDS[Math.floor(bgStep/3) % CHORDS.length];
        playBgNote(chord[noteInChord % chord.length], 0.038);
        // Add octave above softly every 3rd note
        if (noteInChord % 3 === 0) playBgNote(chord[0] * 2, 0.02);
        noteInChord++;
        if (noteInChord % 9 === 0) bgStep++;
    }, 320);
}
document.getElementById('musicBtn').onclick = () => {
    getAC(); bgOn = !bgOn;
    document.getElementById('musicIcon').className = bgOn ? 'ph-duotone ph-music-note' : 'ph-duotone ph-music-note-slash';
    startBg();
};

// ── Render cards ──
deck.forEach((card, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.dataset.pair = card.id;

    const inner  = document.createElement('div'); inner.className = 'card-inner';
    const front  = document.createElement('div'); front.className = 'card-face card-front';
    const back   = document.createElement('div'); back.className = 'card-face card-back';
    back.textContent = card.text;

    inner.appendChild(front); inner.appendChild(back);
    wrap.appendChild(inner);
    wrap.onclick = () => { getAC(); startBg(); flip(wrap); };
    grid.appendChild(wrap);
});

function flip(wrap) {
    if (locked || wrap.classList.contains('flipped') || wrap.classList.contains('matched')) return;
    soundFlip();
    wrap.classList.add('flipped');
    flipped.push(wrap);
    if (flipped.length === 2) { locked = true; setTimeout(check, 500); }
}

function check() {
    const [a, b] = flipped;
    moves++;
    document.getElementById('moves').textContent = moves;

    if (a.dataset.pair === b.dataset.pair) {
        soundMatch();
        a.classList.add('matched'); b.classList.add('matched');
        pFound++;
        document.getElementById('pFound').textContent = pFound;
        flipped = []; locked = false;
        if (pFound === pairs) setTimeout(endGame, 600);
    } else {
        soundMiss();
        a.classList.add('wrong-flash'); b.classList.add('wrong-flash');
        setTimeout(() => {
            a.classList.remove('flipped', 'wrong-flash');
            b.classList.remove('flipped', 'wrong-flash');
            flipped = []; locked = false;
        }, 1000);
    }
}

async function endGame() {
    clearInterval(timerInt); soundWin();
    if (bgInt) { clearInterval(bgInt); bgInt = null; }
    // Big confetti burst
    confetti({ particleCount: 160, spread: 90, origin: {y: 0.4}, colors: ['#7c3aed','#10b981','#f59e0b','#ec4899','#3b82f6'] });
    setTimeout(() => confetti({ particleCount: 80, spread: 60, origin: {y: 0.6, x: 0.2} }), 400);
    setTimeout(() => confetti({ particleCount: 80, spread: 60, origin: {y: 0.6, x: 0.8} }), 600);

    const xp = Math.max(10, 100 - moves * 2);
    const data = { score_percent: 100, xp, time_seconds: timerSec };
    try {
        const r = await fetch(location.href, { method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'}, body:JSON.stringify(data) });
        const j = await r.json();
        setTimeout(() => location.href='/play/{{ game.publish_code }}/result/'+j.session_id+'/', 2500);
    } catch(e){ console.error(e); }
}
</script>
{% endblock %}
