{% extends 'base.html' %}
{% block title %}Ойнау: {{ game.title }}{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 6rem auto;">
    <div class="qz-card" style="padding: 3rem 2rem; text-align: center;">
        <div style="font-size: 3rem; color: var(--qz-purple); margin-bottom: 1.5rem;">
            <i class="ph-duotone ph-rocket-launch"></i>
        </div>
        <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">Ойынға қосылу</h1>
        <p style="color: var(--qz-text-light); font-size: 0.875rem; margin-bottom: 2rem;">{{ game.title }} жинағын бастау үшін атыңызды енгізіңіз</p>
        
        <form action="{% url 'play_game' game.publish_code %}" method="get">
            <div style="margin-bottom: 2rem; text-align: left;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--qz-text-light); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em;">Оқушы есімі</label>
                <input type="text" name="name" required placeholder="Мысалы: Арман" 
                       style="width: 100%; padding: 1rem; border: 1.5px solid var(--qz-purple-border); border-radius: 8px; font-size: 1rem; font-weight: 600; outline: none; transition: border-color 0.2s; background: var(--qz-bg);">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.1rem; font-size: 1rem; border-radius: 10px;">
                <i class="ph-duotone ph-play"></i> Ойынды бастау
            </button>
        </form>
    </div>
</div>
{% endblock %}
