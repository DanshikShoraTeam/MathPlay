{% extends 'base.html' %}
{% block title %}Кіру — MathPlay{% endblock %}

{% block extra_css %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
    :root {
        --violet: #6d28d9;
        --violet-dark: #4c1d95;
        --violet-light: #ede9fe;
        --violet-pale: #f5f3ff;
        --ink: #0f0a1e;
        --gray: #6b7280;
        --border: #e9e4f8;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        color: var(--ink);
    }

    .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--violet-pale);
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    /* background decoration matching hero */
    .auth-wrapper::before {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
        top: -100px;
        right: -100px;
        pointer-events: none;
    }

    .auth-wrapper::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(109, 40, 217, 0.08) 0%, transparent 70%);
        bottom: -80px;
        left: -100px;
        pointer-events: none;
    }

    .back-btn {
        position: absolute;
        top: 32px;
        left: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--gray);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
        z-index: 10;
        padding: 8px 16px;
        background: white;
        border-radius: 10px;
        border: 1px solid var(--border);
    }

    .back-btn:hover {
        color: var(--violet);
        border-color: var(--violet-mid);
        transform: translateX(-4px);
        box-shadow: 0 4px 12px rgba(109, 40, 217, 0.08);
    }

    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 4px 6px rgba(109, 40, 217, 0.04), 0 20px 48px rgba(109, 40, 217, 0.1);
        border: 1px solid var(--border);
        position: relative;
        z-index: 1;
    }

    .auth-logo {
        font-family: 'Sora', sans-serif;
        font-weight: 800;
        font-size: 20px;
        color: var(--violet-dark);
        /* Exactly matching the header color */
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        margin-bottom: 32px;
    }

    .auth-logo span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: var(--violet);
        border-radius: 8px;
        color: white;
        font-size: 16px;
    }

    .auth-title {
        font-family: 'Sora', sans-serif;
        font-size: 24px;
        font-weight: 800;
        color: var(--violet-dark);
        /* Matching the deep dark purple from header */
        text-align: center;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
    }

    .auth-sub {
        font-size: 15px;
        color: var(--gray);
        text-align: center;
        margin-bottom: 32px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 8px;
    }

    .form-input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        color: var(--ink);
        outline: none;
        transition: all 0.2s;
        background: #faf8ff;
        box-sizing: border-box;
    }

    .form-input::placeholder {
        color: #a1a1aa;
        font-weight: 500;
    }

    .form-input:focus {
        border-color: var(--violet);
        background: white;
        box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
    }

    .error-box {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .auth-btn {
        width: 100%;
        padding: 14px;
        background: var(--violet);
        color: white;
        border: none;
        border-radius: 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .auth-btn:hover {
        background: var(--violet-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(109, 40, 217, 0.3);
    }

    .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--gray);
    }

    .auth-footer a {
        color: var(--violet);
        font-weight: 700;
        text-decoration: none;
        transition: color 0.2s;
    }

    .auth-footer a:hover {
        color: var(--violet-dark);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <a href="{% url 'homepage' %}" class="back-btn">
        <i class="ph-bold ph-arrow-left"></i> Артқа
    </a>
    <div class="auth-card">
        <a href="{% url 'homepage' %}" class="auth-logo">
            <span><i class="ph-bold ph-lightning"></i></span> MathPlay
        </a>

        <h1 class="auth-title">Қош келдіңіз!</h1>
        <p class="auth-sub">Аккаунтыңызға кіріңіз</p>

        {% if error %}
        <div class="error-box"><i class="ph-bold ph-warning"></i> {{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Қолданушы аты</label>
                <input type="text" name="username" class="form-input" placeholder="Атыңызды енгізіңіз" required
                    autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Құпия сөз</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">
                Кіру <i class="ph-bold ph-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            Аккаунтыңыз жоқ па? <a href="{% url 'register' %}">Тіркелу</a>
        </div>
    </div>
</div>
{% endblock %}
